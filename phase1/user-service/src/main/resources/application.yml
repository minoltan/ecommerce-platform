server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/user_db
    username: ${DB_USERNAME:user_service}
    password: ${DB_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-service.user-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

# OutboxRelay poll interval (LLD §11 — ≤ 500ms eventual-consistency target).
outbox:
  relay:
    poll-interval-ms: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  issuer: ecommerce-platform
  access-token-ttl-seconds: 900
  # Base64-encoded PKCS8 private key / X.509 public key (PEM body, no headers/newlines).
  # If either is blank, an ephemeral RSA-2048 key pair is generated at startup (dev/test only).
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
