# docs/hld/deployment-architecture.md §3: User/Auth Service — min 2 / max 4 replicas,
# scale on CPU > 60% sustained for 90s (NFR-SCALE-006).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
    scaleDown:
      stabilizationWindowSeconds: 300
