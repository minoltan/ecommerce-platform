# Placeholder Secret (NFR-SEC-010). DO NOT commit real credentials or key material —
# this file documents the required keys; overlays/environments must replace `data`
# with real base64-encoded values via a secrets manager / sealed-secrets / SOPS, not git.
#
# JWT_PRIVATE_KEY / JWT_PUBLIC_KEY MUST be a pre-generated RSA key pair shared by every
# replica (application.yml falls back to an ephemeral per-process key pair when blank,
# which breaks JWT verification across replicas — see k8s/README.md).
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
type: Opaque
stringData:
  DB_USERNAME: user_service
  DB_PASSWORD: changeme
  JWT_PRIVATE_KEY: ""
  JWT_PUBLIC_KEY: ""
